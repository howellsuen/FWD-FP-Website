<!doctype html>
<html lang="en" data-lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coming Soon ｜ 即將推出</title>

  <style>
    /* Page specific */
    .coming {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .coming__box {
      max-width: 560px;
    }

    .coming__logo img {
      height: 200px;
    }

    .coming h1 {
      font-size: 36px;
      margin: 12px;
    }

    .coming p {
      font-size: 16px;
      opacity: 0.95;
      margin-bottom: 20px;
    }

    .coming .btn {
      background: #fff;
      color: #ff6a00;
      font-weight: 600;
    }

    .coming .btn.secondary {
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      margin-left: 8px;
    }
  </style>
</head>

<body>

<section class="coming">
  <div class="coming__box">

    <!-- Logo -->
    <div class="coming__logo">
      <img src="assets/logo.png" alt="FWD FP logo">
    </div>

    <!-- Title -->
    <h1>
      <span lang="en">Corporate Website Coming Soon</span><br/>
      <span lang="zh-Hant">官方網站 即將推出</span>
    </h1>

    <!-- Description -->
    <p>
      <span lang="en">
        Our official website is currently under construction. Please stay tuned.
      </span><br/>
      <span lang="zh-Hant">
        我們的官方網站正在建設中，敬請期待。
      </span>
    </p>

    <!-- Small note -->
    <div class="small" style="margin-top:20px">
      <span lang="en">
        FWD Financial Planning Limited
      </span><br/>
      <span lang="zh-Hant">
        富衛財務策劃有限公司
      </span>
    </div>

  </div>
</section>

</body>
</html>
